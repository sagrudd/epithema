name: Epithema CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-and-repository:
    name: Docs and Repository Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Validate repository structure
        run: make lint-repo

      - name: Check sister repository compatibility awareness
        run: make check-sister-repo

      - name: Run strict documentation validation
        run: make lint-docs PYTHON=python

      - name: Build documentation site
        run: make docs PYTHON=python

      - name: Verify documentation branding
        run: make docs-name-check

      - name: Verify release-generated artefacts are current
        run: make release-generated-check PYTHON=python

  rust:
    name: Rust Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: make fmt

      - name: Run clippy
        run: make lint

      - name: Run tests
        run: make test

      - name: Verify release-mode build
        run: make release-build

  container:
    name: Container Smoke Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Linux-first container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          build-args: |
            EPITHEMA_VERSION=ci-smoke
