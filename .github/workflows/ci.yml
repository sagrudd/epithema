name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-and-repository:
    name: Docs and Repository Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install -r docs/requirements.txt

      - name: Validate repository structure
        run: make lint-repo

      - name: Check sister repository compatibility awareness
        run: make check-sister-repo

      - name: Run strict documentation validation
        run: make lint-docs PYTHON=python

      - name: Build documentation site
        run: make docs PYTHON=python

  rust:
    name: Rust Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect Rust workspace
        id: detect
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust toolchain
        if: steps.detect.outputs.has_cargo == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo fmt --check

      - name: Run clippy
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo test --all-features

      - name: Report deferred Rust validation
        if: steps.detect.outputs.has_cargo != 'true'
        run: echo "No Cargo.toml detected; Rust validation is deferred until a workspace or crate is added."
